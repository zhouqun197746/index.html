name: 📰 RSS 聚合抓取

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-rss:
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ 检出代码
        uses: actions/checkout@v4

      - name: 🔧 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 🐳 启动 RSSHub（Docker）
        run: |
          docker run -d --name rsshub -p 1200:1200 diygod/rsshub
          echo "等待 RSSHub 启动..."
          for i in $(seq 1 30); do
            if curl -s -o /dev/null -w '%{http_code}' http://localhost:1200/ 2>/dev/null | grep -q 200; then
              echo "✅ RSSHub 已就绪"
              break
            fi
            sleep 2
          done

      - name: 📥 抓取 RSSHub 工作路由
        run: |
          mkdir -p rss
          
          echo "=== 36氪 ==="
          curl -sL -o rss/36kr.xml http://localhost:1200/36kr/news
          head -c 100 rss/36kr.xml
          echo ""
          
          echo "=== Hacker News ==="
          curl -sL -o rss/hackernews.xml http://localhost:1200/hackernews
          head -c 100 rss/hackernews.xml
          echo ""

      - name: 🧹 清理 Docker
        if: always()
        run: docker rm -f rsshub 2>/dev/null || true

      - name: 🕸️ 直接抓取腾讯新闻（绕过网络限制）
        run: |
          # 禁用 bash 严格模式，允许部分失败
          set +e
          
          echo "=== 腾讯新闻 - 直接爬取 ==="
          node scripts/fetch-qqnews-rss.mjs

      - name: 📋 列出输出文件
        run: ls -lh rss/

      - name: 📤 提交 RSS 文件回仓库
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rss/
          if git diff --cached --quiet; then
            echo "ℹ️ RSS 文件无变化，跳过提交"
          else
            git commit -m "🤖 RSS 定时更新 $(date '+%Y-%m-%d %H:%M')"
            git push
          fi
