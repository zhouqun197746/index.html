name: 📰 RSS 聚合抓取

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-rss:
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ 检出代码
        uses: actions/checkout@v4

      - name: 🔧 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 🐳 启动 RSSHub（Docker）
        run: |
          docker run -d --name rsshub -p 1200:1200 diygod/rsshub
          for i in $(seq 1 30); do
            curl -s -o /dev/null -w '%{http_code}' http://localhost:1200/ 2>/dev/null | grep -q 200 && break
            sleep 2
          done
          echo "✅ RSSHub 已就绪"

      - name: 📥 抓取 7 个源 + 腾讯新闻
        run: |
          mkdir -p rss
          # 多源抓取（RSSHub → 自带爬虫 双路方案）
          node scripts/fetch-sources.mjs
          # Puppeteer 渲染腾讯新闻 SPA
          node scripts/fetch-qqnews-rss.mjs

      - name: 🧹 清理 Docker
        if: always()
        run: docker rm -f rsshub 2>/dev/null || true

      - name: 📋 列出输出文件
        run: ls -lh rss/*.xml

      - name: 📤 提交 RSS 文件回仓库
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rss/
          if git diff --cached --quiet; then
            echo "ℹ️ RSS 文件无变化，跳过提交"
          else
            git commit -m "🤖 RSS 定时更新 $(date '+%Y-%m-%d %H:%M')"
            git push
          fi
