name: 📰 QQ News RSS (RSSHub)

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-rss:
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ 检出代码
        uses: actions/checkout@v4

      - name: 🐳 启动 RSSHub（Docker）
        run: |
          docker run -d --name rsshub -p 1200:1200 diygod/rsshub
          echo "等待 RSSHub 启动..."
          for i in $(seq 1 30); do
            if curl -s -o /dev/null -w '%{http_code}' http://localhost:1200/ 2>/dev/null | grep -q 200; then
              echo "✅ RSSHub 已就绪"
              break
            fi
            sleep 2
          done

      - name: 🔍 探测所有腾讯系路由
        run: |
          echo "=== RSSHub 首页（查看可用路由）==="
          curl -s http://localhost:1200/ | grep -oP 'href="[^"]*tencent[^"]*"' | head -20
          curl -s http://localhost:1200/ | grep -oP 'href="[^"]*qq[^"]*"' | head -20
          
          echo ""
          echo "=== 探测已知路由 ==="
          for path in \
            /tencent/news \
            /tencent/news/rank \
            /tencent/news/rank?type=hotSpot \
            /tencent/news/rank?type=news \
            /tencent/fresh \
            /tencent/txsj \
            /tencent/qq/sogou \
            /tencent/game \
            /tencent/video \
            /tencent/video/playlist \
            /tencent/shenma; do
            code=$(curl -s -o /dev/null -w '%{http_code}' "http://localhost:1200${path}" 2>/dev/null)
            echo "  ${path} → HTTP ${code}"
          done
          
          echo ""
          echo "=== 探测常规路由（验证 RSSHub 是否能正常生成 RSS）==="
          for path in \
            /github/trending/daily \
            /github/topics \
            /v2ex/topics \
            /zhihu/hotlist \
            /weibo/hot \
            /bilibili/hot \
            /36kr/news \
            /hackernews; do
            code=$(curl -s -o /dev/null -w '%{http_code}' "http://localhost:1200${path}" 2>/dev/null)
            echo "  ${path} → HTTP ${code}"
          done

      - name: 📥 抓取工作路由
        run: |
          mkdir -p rss
          
          # 先试试几个有把握的路由
          echo "=== GitHub Trending ==="
          curl -sL -o rss/github-trending.xml http://localhost:1200/github/trending/daily
          head -3 rss/github-trending.xml
          echo ""
          
          echo "=== 知乎热榜 ==="
          curl -sL -o rss/zhihu-hotlist.xml http://localhost:1200/zhihu/hotlist
          head -3 rss/zhihu-hotlist.xml
          echo ""

      - name: 📋 列出输出文件
        run: ls -lh rss/

      - name: 🧹 清理 Docker
        if: always()
        run: docker rm -f rsshub 2>/dev/null || true

      - name: 📤 提交 RSS 文件回仓库
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rss/
          if git diff --cached --quiet; then
            echo "ℹ️ RSS 文件无变化，跳过提交"
          else
            git commit -m "🤖 RSS 定时更新 $(date '+%Y-%m-%d %H:%M')"
            git push
          fi
