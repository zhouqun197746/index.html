name: 📰 QQ News RSS (RSSHub)

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-rss:
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ 检出代码
        uses: actions/checkout@v4

      - name: 🐳 启动 RSSHub（chromium-bundled 版，带浏览器渲染）
        run: |
          docker run -d --name rsshub -p 1200:1200 diygod/rsshub:chromium-bundled
          echo "等待 RSSHub 启动..."
          for i in $(seq 1 30); do
            if curl -s -o /dev/null -w '%{http_code}' http://localhost:1200/ 2>/dev/null | grep -q 200; then
              echo "✅ RSSHub 已就绪"
              break
            fi
            sleep 2
          done

      - name: 🔍 探测腾讯新闻路由
        run: |
          echo "=== 探测腾讯新闻路由 ==="
          for path in /tencent/news /tencent/news/rank /tencent/news/rank?type=hotSpot; do
            code=$(curl -s -o /dev/null -w '%{http_code}' "http://localhost:1200${path}" 2>/dev/null)
            echo "  ${path} → HTTP ${code}"
          done

      - name: 📥 抓取 RSS
        run: |
          mkdir -p rss
          
          echo "=== 36氪（已验证可工作）==="
          curl -sL -o rss/36kr.xml http://localhost:1200/36kr/news
          echo "大小: $(wc -c < rss/36kr.xml) bytes"
          head -c 200 rss/36kr.xml
          echo ""
          
          echo "=== Hacker News（已验证可工作）==="
          curl -sL -o rss/hackernews.xml http://localhost:1200/hackernews
          echo "大小: $(wc -c < rss/hackernews.xml) bytes"
          head -c 200 rss/hackernews.xml
          echo ""

      - name: 📋 列出输出文件
        run: ls -lh rss/

      - name: 🧹 清理 Docker
        if: always()
        run: docker rm -f rsshub 2>/dev/null || true

      - name: 📤 提交 RSS 文件回仓库
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rss/
          if git diff --cached --quiet; then
            echo "ℹ️ RSS 文件无变化，跳过提交"
          else
            git commit -m "🤖 RSS 定时更新 $(date '+%Y-%m-%d %H:%M')"
            git push
          fi
